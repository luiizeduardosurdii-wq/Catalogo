<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" fill="none">
  <rect width="1440" height="640" fill="#faf6ef"/>
  <rect width="1440" height="640" fill="url(#paper)" opacity="0.35"/>
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
